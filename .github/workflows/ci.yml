name: CI

on:
  push:
  pull_request:

jobs:
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install uv

      - name: Run unit tests
        run: uv run pytest

  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tar curl ca-certificates

      - name: Install uv
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install uv

      - name: Run integration tests (non-container)
        run: uv run pytest tests/integration -m "not container and not gitlab_api"

  test-integration-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install uv

      - name: Check docker
        run: docker version

      - name: Run integration tests (container)
        run: uv run pytest tests/integration -m container
