name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-dist:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-gnu
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-gnueabihf
          # python-build-standalone does not publish armv7 musl for our pinned CPython.
          # - armv7-unknown-linux-musleabihf
          - x86_64-apple-darwin
          - aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq make curl ca-certificates tar gzip

      - name: Build dist tarball
        env:
          VERSION: ${{ github.ref_name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          python3 -m pip install --upgrade pip
          make dist VERSION="$VERSION" REPO_URL="$REPO_URL" PPT_DIST_TARGETS="${{ matrix.target }}"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            dist/ppt-*.tar.gz
            dist/install.sh

  github-release:
    needs: build-dist
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all dist artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ppt-*.tar.gz
            dist/install.sh
