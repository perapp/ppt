stages:
  - test
  - release

test:unit:
  stage: test
  image: python:3.12-slim
  script:
    - python3 -m pip install --upgrade pip
    - python3 -m pip install uv
    - uv run pytest

test:integration:
  stage: test
  image: python:3.12-slim
  script:
    - python3 -m pip install --upgrade pip
    - python3 -m pip install uv
    - apt-get update -qq
    - apt-get install -y -qq tar curl ca-certificates >/dev/null
    - uv run pytest tests/integration -m "not container and not gitlab_api"

test:integration:gitlab_api:
  stage: test
  image: python:3.12-slim
  # TODO: Re-enable automatic runs once GitLab token provisioning is fixed.
  # Currently this job fails in CI when GITLAB_TOKEN/GL_TOKEN is not available.
  rules:
    - when: manual
  allow_failure: true
  script:
    - python3 -m pip install --upgrade pip
    - python3 -m pip install uv
    - uv run pytest tests/integration -m gitlab_api

test:integration:container:
  stage: test
  image: python:3.12-slim
  services:
    - name: docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  script:
    - python3 -m pip install --upgrade pip
    - python3 -m pip install uv
    - apt-get update -qq
    - apt-get install -y -qq docker.io >/dev/null
    - docker version
    - uv run pytest tests/integration -m container

build_dist:x86_64-unknown-linux-gnu:
  stage: release
  image: python:3.12-slim
  variables:
    PPT_DIST_TARGET: x86_64-unknown-linux-gnu
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v/'
    - if: '$CI_PIPELINE_SOURCE == "push"'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
  script:
    - apt-get update -qq
    - apt-get install -y -qq make curl ca-certificates tar gzip >/dev/null
    - python3 -m pip install --upgrade pip
    - VERSION="${CI_COMMIT_TAG:-v0.0.0-dev-${CI_COMMIT_SHORT_SHA}}"
    - make dist VERSION="$VERSION" PPT_DIST_TARGETS="$PPT_DIST_TARGET"
  artifacts:
    when: always
    expire_in: never
    paths:
      - dist/ppt-*.tar.gz
      - dist/install.sh

