create_gitlab_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - "build_dist:x86_64-unknown-linux-gnu"
    - "build_dist:x86_64-unknown-linux-musl"
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v/'
  script:
    - |
      set -euo pipefail
      VERSION="$CI_COMMIT_TAG"
      base_url_linux="$CI_PROJECT_URL/-/jobs/artifacts/$VERSION/raw/dist"
      release-cli create \
        --name "ppt $VERSION" \
        --tag-name "$VERSION" \
        --description "Release $VERSION" \
        --assets-link "{\"name\":\"install.sh\",\"url\":\"$base_url_linux/install.sh?job=build_dist:x86_64-unknown-linux-gnu\",\"filepath\":\"/install.sh\"}" \
        --assets-link "{\"name\":\"ppt-x86_64-unknown-linux-gnu.tar.gz\",\"url\":\"$base_url_linux/ppt-${VERSION}-x86_64-unknown-linux-gnu.tar.gz?job=build_dist:x86_64-unknown-linux-gnu\",\"filepath\":\"/ppt-x86_64-unknown-linux-gnu.tar.gz\"}" \
        --assets-link "{\"name\":\"ppt-x86_64-unknown-linux-musl.tar.gz\",\"url\":\"$base_url_linux/ppt-${VERSION}-x86_64-unknown-linux-musl.tar.gz?job=build_dist:x86_64-unknown-linux-musl\",\"filepath\":\"/ppt-x86_64-unknown-linux-musl.tar.gz\"}"
