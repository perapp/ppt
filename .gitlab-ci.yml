stages:
  - test
  - release

test:
  stage: test
  image: python:3.12-slim
  script:
    - python3 -m pip install --upgrade pip
    - python3 -m pip install uv
    - uv run pytest

build_release_assets:
  stage: release
  image: alpine:3.20
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v/
  script:
    - apk add --no-cache bash curl tar gzip
    - |
      set -euo pipefail
      VERSION="$CI_COMMIT_TAG"
      DIST_DIR="dist"
      mkdir -p "$DIST_DIR"

      out="$DIST_DIR/ppt-${VERSION}-linux.tar.gz"
      tmp=$(mktemp -d)
      mkdir -p "$tmp/bin" "$tmp/src"
      cp -R src/ppt "$tmp/src/ppt"
      cat >"$tmp/bin/ppt" <<'EOF'
#!/usr/bin/env bash
set -euo pipefail
APP_DIR=$(CDPATH= cd -- "$(dirname -- "$0")/.." && pwd)
export PYTHONPATH="$APP_DIR/src${PYTHONPATH:+:$PYTHONPATH}"
exec python3 -m ppt "$@"
EOF
      chmod 755 "$tmp/bin/ppt"
      tar -C "$tmp" -czf "$out" bin src
      rm -rf "$tmp"

      base="$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/ppt/$VERSION"
      for file in "$DIST_DIR"/*.tar.gz; do
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file "$file" "$base/$(basename "$file")"
      done
  artifacts:
    when: always
    paths:
      - dist/*.tar.gz

create_gitlab_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: ["build_release_assets"]
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v/
  script:
    - |
      set -euo pipefail
      VERSION="$CI_COMMIT_TAG"
      base_url="$CI_PROJECT_URL/-/packages/generic/ppt/$VERSION"
      release-cli create \
        --name "ppt $VERSION" \
        --tag-name "$VERSION" \
        --description "Release $VERSION" \
        --assets-link "{\"name\":\"ppt-${VERSION}-linux.tar.gz\",\"url\":\"$base_url/ppt-${VERSION}-linux.tar.gz\"}"
