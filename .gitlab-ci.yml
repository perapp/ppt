stages:
  - test
  - release

test:unit:
  stage: test
  image: python:3.12-slim
  script:
    - python3 -m pip install --upgrade pip
    - python3 -m pip install uv
    - uv run pytest

test:integration:
  stage: test
  image: python:3.12-slim
  script:
    - python3 -m pip install --upgrade pip
    - python3 -m pip install uv
    - uv run pytest tests/integration -m "not container and not gitlab_api"

test:integration:gitlab_api:
  stage: test
  image: python:3.12-slim
  # TODO: Re-enable automatic runs once GitLab token provisioning is fixed.
  # Currently this job fails in CI when GITLAB_TOKEN/GL_TOKEN is not available.
  rules:
    - when: manual
  allow_failure: true
  script:
    - python3 -m pip install --upgrade pip
    - python3 -m pip install uv
    - uv run pytest tests/integration -m gitlab_api

test:integration:container:
  stage: test
  image: python:3.12-slim
  services:
    - name: docker:dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
  script:
    - python3 -m pip install --upgrade pip
    - python3 -m pip install uv
    - apt-get update -qq
    - apt-get install -y -qq docker.io >/dev/null
    - docker version
    - uv run pytest tests/integration -m container

build_release_assets:
  stage: release
  image: alpine:3.20
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v/'
  script:
    - apk add --no-cache bash make python3 tar gzip
    - make release-assets VERSION="$CI_COMMIT_TAG"
  artifacts:
    when: always
    expire_in: never
    paths:
      - dist/*.tar.gz

create_gitlab_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: ["build_release_assets"]
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v/'
  script:
    - |
      set -euo pipefail
      VERSION="$CI_COMMIT_TAG"
      base_url="$CI_PROJECT_URL/-/jobs/artifacts/$VERSION/raw/dist"
      release-cli create \
        --name "ppt $VERSION" \
        --tag-name "$VERSION" \
        --description "Release $VERSION" \
        --assets-link "{\"name\":\"ppt-${VERSION}-linux.tar.gz\",\"url\":\"$base_url/ppt-${VERSION}-linux.tar.gz?job=build_release_assets\"}"
