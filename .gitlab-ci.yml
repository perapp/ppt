create_gitlab_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - "build_dist:x86_64-unknown-linux-gnu"
    - "build_dist:x86_64-unknown-linux-musl"
    - "build_dist:aarch64-unknown-linux-gnu"
    - "build_dist:aarch64-unknown-linux-musl"
    - "build_dist:armv7-unknown-linux-gnueabihf"
    - "build_dist:x86_64-apple-darwin"
    - "build_dist:aarch64-apple-darwin"
  rules:
    - if: '$CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v/'
  script:
    - |
      set -euo pipefail
      VERSION="$CI_COMMIT_TAG"
      artifact_base_url="$CI_PROJECT_URL/-/jobs/artifacts/$VERSION/raw/dist"
      release-cli create \
        --name "ppt $VERSION" \
        --tag-name "$VERSION" \
        --description "Release $VERSION" \
        --assets-link "{\"name\":\"install.sh\",\"url\":\"$artifact_base_url/install.sh?job=build_dist:x86_64-unknown-linux-gnu\",\"filepath\":\"/install.sh\"}" \
        --assets-link "{\"name\":\"ppt-x86_64-unknown-linux-gnu.tar.gz\",\"url\":\"$artifact_base_url/ppt-${VERSION}-x86_64-unknown-linux-gnu.tar.gz?job=build_dist:x86_64-unknown-linux-gnu\",\"filepath\":\"/ppt-x86_64-unknown-linux-gnu.tar.gz\"}" \
        --assets-link "{\"name\":\"ppt-x86_64-unknown-linux-musl.tar.gz\",\"url\":\"$artifact_base_url/ppt-${VERSION}-x86_64-unknown-linux-musl.tar.gz?job=build_dist:x86_64-unknown-linux-musl\",\"filepath\":\"/ppt-x86_64-unknown-linux-musl.tar.gz\"}" \
        --assets-link "{\"name\":\"ppt-aarch64-unknown-linux-gnu.tar.gz\",\"url\":\"$artifact_base_url/ppt-${VERSION}-aarch64-unknown-linux-gnu.tar.gz?job=build_dist:aarch64-unknown-linux-gnu\",\"filepath\":\"/ppt-aarch64-unknown-linux-gnu.tar.gz\"}" \
        --assets-link "{\"name\":\"ppt-aarch64-unknown-linux-musl.tar.gz\",\"url\":\"$artifact_base_url/ppt-${VERSION}-aarch64-unknown-linux-musl.tar.gz?job=build_dist:aarch64-unknown-linux-musl\",\"filepath\":\"/ppt-aarch64-unknown-linux-musl.tar.gz\"}" \
        --assets-link "{\"name\":\"ppt-armv7-unknown-linux-gnueabihf.tar.gz\",\"url\":\"$artifact_base_url/ppt-${VERSION}-armv7-unknown-linux-gnueabihf.tar.gz?job=build_dist:armv7-unknown-linux-gnueabihf\",\"filepath\":\"/ppt-armv7-unknown-linux-gnueabihf.tar.gz\"}" \
        --assets-link "{\"name\":\"ppt-x86_64-apple-darwin.tar.gz\",\"url\":\"$artifact_base_url/ppt-${VERSION}-x86_64-apple-darwin.tar.gz?job=build_dist:x86_64-apple-darwin\",\"filepath\":\"/ppt-x86_64-apple-darwin.tar.gz\"}" \
        --assets-link "{\"name\":\"ppt-aarch64-apple-darwin.tar.gz\",\"url\":\"$artifact_base_url/ppt-${VERSION}-aarch64-apple-darwin.tar.gz?job=build_dist:aarch64-apple-darwin\",\"filepath\":\"/ppt-aarch64-apple-darwin.tar.gz\"}"
